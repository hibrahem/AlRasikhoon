flutter_native_splash:
  # Native splash per the final brand handoff: the cream drop on the hero
  # green. The native layer can't gradient, so it uses heroTop flat
  # (#1E6923 light / #0F3D16 dark) — the animated in-app splash
  # (splash_overlay.dart) then paints the full heroTop→heroBottom gradient
  # over it, so the hand-off is a subtle deepen, not a jump.
  color: "#1E6923"
  color_dark: "#0F3D16"
  image: assets/brand/splash-logo-cream.png
  image_dark: assets/brand/splash-logo-cream-dark.png
  android_12:
    color: "#1E6923"
    color_dark: "#0F3D16"
    image: assets/brand/splash-logo-cream.png
    image_dark: assets/brand/splash-logo-cream-dark.png
  fullscreen: true
  android: true
  ios: true
  web: false
