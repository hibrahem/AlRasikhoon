flutter_native_splash:
  # Color-only native splash: the flat hero green (heroTop token), with NO
  # logo image. The animated in-app splash (splash_overlay.dart) opens on the
  # exact same flat color and eases in the heroTop→heroBottom gradient while
  # the cream drop rises and the Reem Kufi lockup fades up — so the OS→Flutter
  # hand-off is invisible and the logo appears exactly once. (Showing the drop
  # here too rendered it centered at a different size than the animated
  # lockup, causing a visible jump at hand-off.)
  # Android 12+ still shows the launcher icon briefly — the OS forces it —
  # which is the same cream drop on green, so it stays coherent.
  color: "#1E6923"
  color_dark: "#0F3D16"
  android_12:
    color: "#1E6923"
    color_dark: "#0F3D16"
  fullscreen: true
  android: true
  ios: true
  web: false
