flutter_launcher_icons:
  # Masters are derived from the official الراسخون brand PDF (gold
  # calligraphy on black): the teardrop mark cropped, background-keyed, and
  # composed at 1024×1024. Regenerate the platform icons after replacing the
  # masters with:
  #   dart run flutter_launcher_icons
  android: true
  ios: true
  image_path: assets/branding/app_icon.png
  # Android 13+ themed/adaptive icon: the gold mark over the artwork's own
  # black within the safe zone.
  adaptive_icon_background: "#110F0E"
  adaptive_icon_foreground: assets/branding/app_icon_foreground.png
  remove_alpha_ios: true
  web:
    generate: true
    image_path: assets/branding/app_icon.png
    background_color: "#110F0E"
    theme_color: "#110F0E"
