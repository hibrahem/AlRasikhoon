name: al_rasikhoon
description: "تطبيق الراسخون لحفظ القرآن الكريم"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  cloud_firestore: ^6.1.2
  firebase_storage: ^13.0.6

  # State Management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # Navigation
  go_router: ^17.0.1

  # Local Storage
  shared_preferences: ^2.3.4
  hive_flutter: ^1.1.0

  # UI
  intl: ^0.20.2
  google_fonts: ^8.0.0
  flutter_svg: ^2.0.17

  # Utilities
  connectivity_plus: ^7.0.0
  uuid: ^4.5.1

  # Cloud Functions
  cloud_functions: ^6.0.6

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^4.0.0+1
  json_serializable: ^6.9.3
  mocktail: ^1.0.4
  fake_cloud_firestore: ^4.0.1
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    # Cairo, bundled — the app's whole type system (AppTheme) is Cairo, and
    # google_fonts otherwise DOWNLOADS it on first launch. That made the type a
    # cold-start dependency on connectivity (a halaqa may have none), and it
    # made layout non-deterministic off-device: with no network the fallback
    # font's metrics differ, text gets taller, and screens that fit on a phone
    # overflow. Bundling pins the metrics everywhere — app and tests alike.
    # `GoogleFonts.config.allowRuntimeFetching = false` (main.dart) makes a
    # missing weight fail loudly here rather than silently fetch at runtime.
    - google_fonts/
