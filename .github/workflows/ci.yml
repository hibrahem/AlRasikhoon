# CI — Al-Rasikhoon
#
# Refs: issue #6 (this pipeline).
#
# Two independent jobs:
#   - flutter:   analyze + UNIT tests for the Flutter/Dart app
#   - functions: build (+ lint) for the Firebase Cloud Functions TypeScript package
#
# The jobs are intentionally independent (no `needs:`) so a failure in one
# does not mask the result of the other and both run in parallel.
#
# Design rationale + options considered: docs/agdr/AgDR-0001-github-actions-ci.md
# Job descriptions: .github/workflows/README.md

name: CI

# Quoted so the key is an unambiguous string under any YAML parser
# (bare `on:` is coerced to boolean `true` under YAML 1.1 — the "Norway
# problem"). GitHub Actions accepts both; quoting keeps tooling honest.
"on":
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Pinned Flutter stable that bundles Dart 3.9.2, satisfying the
  # pubspec.yaml constraint `environment: sdk: ^3.9.2`.
  # NOTE: Flutter 3.35.0–3.35.2 bundle Dart 3.9.0 which does NOT satisfy
  # `^3.9.2`, so the patch version is load-bearing — do not loosen to `3.35.x`.
  FLUTTER_VERSION: "3.35.7"

  # Node version for the Cloud Functions job. Source of truth is
  # functions/package.json -> engines.node ("22"). Keep this constant in
  # sync with engines.node; it is the single place to change on a runtime bump.
  NODE_VERSION: "22"

jobs:
  # ===========================================================================
  # flutter — analyze + unit tests for the Flutter/Dart app
  # ===========================================================================
  flutter:
    name: Flutter (analyze + unit tests)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      # `flutter analyze` is fatal-on-infos-and-warnings by default. The repo
      # carries pre-existing whole-project *info* debt (notably 106
      # `withOpacity` deprecation infos) that would red-block this job and
      # skip the Unit-tests step below. `--no-fatal-infos` makes infos
      # non-blocking while keeping warnings AND errors fatal (we deliberately
      # do NOT pass `--no-fatal-warnings` — real signal, e.g. the fixed
      # sealed-class mock warnings, must still fail the job).
      #
      # The info debt is tracked: issue #13 (withOpacity → Color.withValues
      # migration). Rationale + options: docs/agdr/AgDR-0002-ci-non-fatal-infos.md
      - name: Analyze
        run: flutter analyze --no-fatal-infos

      # Unit, widget AND the five E2E suites (test/e2e/) — all of it, on the
      # Dart VM, in well under a minute. This closes issue #5.
      #
      # The E2E suites used to demand a booted simulator, purely because they
      # lived in `integration_test/` and used its binding. They never actually
      # needed a device: they fake Firestore and override every provider, and
      # nothing calls Firebase.initializeApp. The device cost a ~28-minute cold
      # Xcode build of the Firebase iOS SDKs per CI run, which is why nothing
      # ever ran them — and three separate breakages reached `main` unseen.
      #
      # They now run at a real phone's viewport, safe-area padding included
      # (test/e2e/helpers/test_app.dart). That is not decoration: the host's
      # default 800x600 surface hides exactly the below-the-fold bugs this suite
      # exists to catch.
      #
      # `integration_test/` still holds firebase_emulator_flow_test.dart, which
      # talks to a REAL Firestore via `firebase emulators:start`. It genuinely
      # needs that emulator, so it is not run here — and `flutter test test/`
      # does not pick it up.
      - name: Unit, widget and E2E tests
        run: flutter test test/

  # ===========================================================================
  # functions — build (+ lint) for the Firebase Cloud Functions package
  # ===========================================================================
  functions:
    name: Functions (build + lint)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: functions

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # `npm ci` requires a committed package-lock.json. This repo
      # deliberately gitignores functions/package-lock.json (root .gitignore:
      # "Cloud Function lockfile (regenerated by npm)"), so there is no lock to
      # install from in CI — `npm install` is the correct choice here. See the
      # tradeoffs section of docs/agdr/AgDR-0001-github-actions-ci.md.
      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      # Build-freshness guard (issue al_rasikhoon-x9v, follow-up to
      # al_rasikhoon-fh2). `npm run verify:build-fresh` rebuilds functions/lib
      # and asserts the compiled artifact matches a clean build of
      # functions/src, so a stale lib can never pass CI. On a fresh CI checkout
      # functions/lib is gitignored and therefore absent — the script builds it
      # from src and passes (a clean checkout cannot carry a stale artifact),
      # while still proving src compiles. The same script gives the deploy path
      # (scripts/deploy_functions.sh) its teeth, where a developer's machine can
      # be holding an out-of-date lib.
      - name: Verify build freshness
        run: npm run verify:build-fresh

      # Guard the deployed-build-identity tooling (issue al_rasikhoon-5a0) from
      # bitrot: compute HEAD's build stamp here (functions/lib exists from the
      # step above). This exercises stamp COMPUTATION only; the deploy path's
      # read-back-and-compare against LIVE functions needs deploy credentials
      # and runs in scripts/deploy_functions.sh, not in CI.
      - name: Verify build stamp computes
        run: bash scripts/build-stamp.sh

      # functions/package.json defines a `lint` script
      # ("eslint --ext .ts src/"). Run it. If a future change removes the
      # script, `npm run lint --if-present` makes this step a silent no-op
      # instead of a hard failure.
      - name: Lint
        run: npm run lint --if-present
