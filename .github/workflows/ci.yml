# CI — Al-Rasikhoon
#
# Refs: issue #6 (this pipeline).
#
# Three independent jobs:
#   - flutter:     analyze + UNIT tests for the Flutter/Dart app
#   - integration: the integration suite, on a booted iOS simulator (issue #5)
#   - functions:   build (+ lint) for the Firebase Cloud Functions TypeScript package
#
# The jobs are intentionally independent (no `needs:`) so a failure in one
# does not mask the result of the other and all three run in parallel.
#
# Design rationale + options considered: docs/agdr/AgDR-0001-github-actions-ci.md
# Job descriptions: .github/workflows/README.md

name: CI

# Quoted so the key is an unambiguous string under any YAML parser
# (bare `on:` is coerced to boolean `true` under YAML 1.1 — the "Norway
# problem"). GitHub Actions accepts both; quoting keeps tooling honest.
"on":
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Pinned Flutter stable that bundles Dart 3.9.2, satisfying the
  # pubspec.yaml constraint `environment: sdk: ^3.9.2`.
  # NOTE: Flutter 3.35.0–3.35.2 bundle Dart 3.9.0 which does NOT satisfy
  # `^3.9.2`, so the patch version is load-bearing — do not loosen to `3.35.x`.
  FLUTTER_VERSION: "3.35.7"

  # Node version for the Cloud Functions job. Source of truth is
  # functions/package.json -> engines.node ("22"). Keep this constant in
  # sync with engines.node; it is the single place to change on a runtime bump.
  NODE_VERSION: "22"

jobs:
  # ===========================================================================
  # flutter — analyze + unit tests for the Flutter/Dart app
  # ===========================================================================
  flutter:
    name: Flutter (analyze + unit tests)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      # `flutter analyze` is fatal-on-infos-and-warnings by default. The repo
      # carries pre-existing whole-project *info* debt (notably 106
      # `withOpacity` deprecation infos) that would red-block this job and
      # skip the Unit-tests step below. `--no-fatal-infos` makes infos
      # non-blocking while keeping warnings AND errors fatal (we deliberately
      # do NOT pass `--no-fatal-warnings` — real signal, e.g. the fixed
      # sealed-class mock warnings, must still fail the job).
      #
      # The info debt is tracked: issue #13 (withOpacity → Color.withValues
      # migration). Rationale + options: docs/agdr/AgDR-0002-ci-non-fatal-infos.md
      - name: Analyze
        run: flutter analyze --no-fatal-infos

      # Unit suite only. `flutter test` defaults to the `test/` directory and
      # does NOT pick up `integration_test/` — scoping to `test/` explicitly
      # documents the intent and keeps the boundary obvious.
      #
      # The integration suite needs a booted device, so it runs in the
      # `integration` job below (macOS + iOS simulator), NOT here.
      - name: Unit tests
        run: flutter test test/

  # ===========================================================================
  # integration — the integration suite, on a booted iOS simulator (issue #5)
  # ===========================================================================
  #
  # WHY THIS JOB EXISTS. Until now CI ran analyze + unit tests only, and the
  # integration suite ran nowhere. It rotted silently: two PRs merged green
  # while leaving six integration tests red (al_rasikhoon-8oh). Both breakages
  # were real product changes the tests had not been told about — a تلقين
  # session where a graded lesson used to be, and an exam button that moved
  # below the fold once its screen learned to scroll. Unit tests could not see
  # either. Only the integration suite could, and nothing ran it.
  #
  # macOS + iOS simulator, deliberately: `flutter test integration_test/`
  # requires a real device, and the Android emulator hangs on this suite
  # (al_rasikhoon-1fg). macOS runners bill at a premium, which is the honest
  # cost of actually gating on this.
  integration:
    name: Flutter (integration tests, iOS simulator)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      # Boot the first available iPhone simulator and wait until it is fully
      # booted — `simctl boot` returns immediately, and `flutter test -d` on a
      # half-booted simulator fails in ways that look like test failures.
      - name: Boot iOS simulator
        run: |
          set -euo pipefail
          UDID=$(xcrun simctl list devices available \
            | grep -Eo 'iPhone[^(]*\(([0-9A-F-]{36})\)' \
            | head -1 \
            | grep -Eo '[0-9A-F-]{36}')
          if [ -z "$UDID" ]; then
            echo "::error::No iPhone simulator available on this runner"
            xcrun simctl list devices available
            exit 1
          fi
          echo "Booting simulator $UDID"
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
          echo "SIM_UDID=$UDID" >> "$GITHUB_ENV"

      # Build the app in its OWN step. `flutter test` builds it otherwise, and
      # that build runs INSIDE the first test's timeout: a cold Xcode build on
      # a CI runner takes longer than flutter's default 12-minute per-test
      # timeout, so the suite dies with "TimeoutException after 0:12:00" while
      # still printing "Running Xcode build..." — a build cost wearing a test
      # failure's clothes. Building here keeps the two honest: a build problem
      # fails as a build problem, and the test step starts from a warm build.
      - name: Build the app for the simulator
        run: flutter build ios --simulator --debug

      # ONE invocation, via the aggregate entry point. `app_test.dart` imports
      # and runs all five E2E suites (auth, admin, teacher, student, supervisor)
      # in a single binary — which is the whole reason it exists.
      #
      # Do NOT loop `flutter test` over integration_test/*_test.dart instead:
      # each invocation drives a fresh Xcode build of the app, which (a) took
      # 37 minutes against 3 for this, and (b) collided on the shared
      # DerivedData build.db — "Xcode build failed too many times due to
      # concurrent builds" — failing suites for reasons that had nothing to do
      # with the code under test.
      #
      # integration_test/firebase_emulator_flow_test.dart is deliberately NOT run
      # here, and is not part of app_test.dart: it talks to a real Firestore via
      # `firebase emulators:start`, which this job does not run. Every suite
      # app_test.dart does run uses fake_cloud_firestore and needs no emulator.
      #
      # --timeout is headroom over the default 12m: even warm, the first test
      # pays for app install + launch on the simulator.
      - name: Integration tests
        run: flutter test integration_test/app_test.dart -d "$SIM_UDID" --timeout 30m

  # ===========================================================================
  # functions — build (+ lint) for the Firebase Cloud Functions package
  # ===========================================================================
  functions:
    name: Functions (build + lint)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: functions

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # `npm ci` requires a committed package-lock.json. This repo
      # deliberately gitignores functions/package-lock.json (root .gitignore:
      # "Cloud Function lockfile (regenerated by npm)"), so there is no lock to
      # install from in CI — `npm install` is the correct choice here. See the
      # tradeoffs section of docs/agdr/AgDR-0001-github-actions-ci.md.
      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      # functions/package.json defines a `lint` script
      # ("eslint --ext .ts src/"). Run it. If a future change removes the
      # script, `npm run lint --if-present` makes this step a silent no-op
      # instead of a hard failure.
      - name: Lint
        run: npm run lint --if-present
