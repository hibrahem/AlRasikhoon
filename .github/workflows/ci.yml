# CI — Al-Rasikhoon
#
# Refs: issue #6 (this pipeline).
#
# Two independent jobs:
#   - flutter:   analyze + UNIT tests for the Flutter/Dart app
#   - functions: build (+ lint) for the Firebase Cloud Functions TypeScript package
#
# The jobs are intentionally independent (no `needs:`) so a failure in one
# does not mask the result of the other and both run in parallel.
#
# Design rationale + options considered: docs/agdr/AgDR-0001-github-actions-ci.md
# Job descriptions: .github/workflows/README.md

name: CI

# Quoted so the key is an unambiguous string under any YAML parser
# (bare `on:` is coerced to boolean `true` under YAML 1.1 — the "Norway
# problem"). GitHub Actions accepts both; quoting keeps tooling honest.
"on":
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Pinned Flutter stable that bundles Dart 3.9.2, satisfying the
  # pubspec.yaml constraint `environment: sdk: ^3.9.2`.
  # NOTE: Flutter 3.35.0–3.35.2 bundle Dart 3.9.0 which does NOT satisfy
  # `^3.9.2`, so the patch version is load-bearing — do not loosen to `3.35.x`.
  FLUTTER_VERSION: "3.35.7"

  # Node version for the Cloud Functions job. Source of truth is
  # functions/package.json -> engines.node ("22"). Keep this constant in
  # sync with engines.node; it is the single place to change on a runtime bump.
  NODE_VERSION: "22"

jobs:
  # ===========================================================================
  # flutter — analyze + unit tests for the Flutter/Dart app
  # ===========================================================================
  flutter:
    name: Flutter (analyze + unit tests)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      # `flutter analyze` is fatal-on-infos-and-warnings by default. The repo
      # carries pre-existing whole-project *info* debt (notably 106
      # `withOpacity` deprecation infos) that would red-block this job and
      # skip the Unit-tests step below. `--no-fatal-infos` makes infos
      # non-blocking while keeping warnings AND errors fatal (we deliberately
      # do NOT pass `--no-fatal-warnings` — real signal, e.g. the fixed
      # sealed-class mock warnings, must still fail the job).
      #
      # The info debt is tracked: issue #13 (withOpacity → Color.withValues
      # migration). Rationale + options: docs/agdr/AgDR-0002-ci-non-fatal-infos.md
      - name: Analyze
        run: flutter analyze --no-fatal-infos

      # Unit, widget AND the five E2E suites (test/e2e/) — all of it, on the
      # Dart VM, in well under a minute. This closes issue #5.
      #
      # The E2E suites used to demand a booted simulator, purely because they
      # lived in `integration_test/` and used its binding. They never actually
      # needed a device: they fake Firestore and override every provider, and
      # nothing calls Firebase.initializeApp. The device cost a ~28-minute cold
      # Xcode build of the Firebase iOS SDKs per CI run, which is why nothing
      # ever ran them — and three separate breakages reached `main` unseen.
      #
      # They now run at a real phone's viewport, safe-area padding included
      # (test/e2e/helpers/test_app.dart). That is not decoration: the host's
      # default 800x600 surface hides exactly the below-the-fold bugs this suite
      # exists to catch.
      #
      # `integration_test/` still holds firebase_emulator_flow_test.dart, which
      # talks to a REAL Firestore via `firebase emulators:start`. It genuinely
      # needs that emulator, so it is not run here — and `flutter test test/`
      # does not pick it up.
      - name: Unit, widget and E2E tests
        run: flutter test test/

  # ===========================================================================
  # functions — build (+ lint) for the Firebase Cloud Functions package
  # ===========================================================================
  functions:
    name: Functions (build + lint)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: functions

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # `npm ci` requires a committed package-lock.json. This repo
      # deliberately gitignores functions/package-lock.json (root .gitignore:
      # "Cloud Function lockfile (regenerated by npm)"), so there is no lock to
      # install from in CI — `npm install` is the correct choice here. See the
      # tradeoffs section of docs/agdr/AgDR-0001-github-actions-ci.md.
      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      # functions/package.json defines a `lint` script
      # ("eslint --ext .ts src/"). Run it. If a future change removes the
      # script, `npm run lint --if-present` makes this step a silent no-op
      # instead of a hard failure.
      - name: Lint
        run: npm run lint --if-present

  # ===========================================================================
  # distribute-android — build a release-signed APK and ship it to Firebase App
  # Distribution so stakeholders can test every change that lands on `main`.
  #
  # Gated: `needs: [flutter, functions]` means a build reaches testers ONLY
  # after the app tests AND the functions build are green — a red `main` never
  # ships. The `if:` guard restricts it to direct pushes to `main` (never PRs).
  #
  # Reuses the existing scripts/distribute_android.sh (single source of truth
  # for the build+upload) plus scripts/extract_release_notes.sh for the
  # stakeholder-facing notes. Release notes come from the top section of
  # CHANGELOG.md — keep it current (see the changelog rule in CLAUDE.md).
  #
  # Design + secrets: docs/superpowers/specs/2026-07-15-android-firebase-distribution-design.md
  #                   docs/agdr/AgDR-0004-android-firebase-distribution.md
  # ===========================================================================
  distribute-android:
    name: Distribute Android (Firebase App Distribution)
    needs: [flutter, functions]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Android Gradle builds run on JDK 17 regardless of the app's Java 11
      # source/target compatibility. Pin it so the toolchain is deterministic.
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      # Node is needed only to install the Firebase CLI used for the upload.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Resolve dependencies
        run: flutter pub get

      # Reconstruct release signing from secrets. The keystore is decoded to a
      # runner-local file OUTSIDE the repo tree ($RUNNER_TEMP) so it can never
      # be committed; android/key.properties (gitignored) points gradle at it.
      # GitHub masks registered secret values in logs, so the writes are safe.
      - name: Configure release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "$ANDROID_KEYSTORE_BASE64" ]]; then
            echo "ERROR: ANDROID_KEYSTORE_BASE64 secret is empty or unset." >&2
            exit 1
          fi
          KEYSTORE_PATH="$RUNNER_TEMP/upload-keystore.jks"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          {
            echo "storeFile=$KEYSTORE_PATH"
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "keyPassword=$ANDROID_KEY_PASSWORD"
          } > android/key.properties

      # Fails loudly if the changelog's top section is missing or empty, so a
      # forgotten changelog blocks the release instead of shipping empty notes.
      - name: Generate stakeholder release notes
        run: scripts/extract_release_notes.sh CHANGELOG.md > "$RUNNER_TEMP/release-notes.txt"

      # BUILD_NUMBER=run_number gives every main push a unique, increasing
      # Android versionCode so App Distribution treats each as a new release.
      # FIREBASE_TOKEN is auto-detected by firebase-tools from the environment.
      - name: Build and distribute APK
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          GROUPS: beta-testers
          BUILD_NUMBER: ${{ github.run_number }}
          RELEASE_NOTES_FILE: ${{ runner.temp }}/release-notes.txt
        run: scripts/distribute_android.sh apk
