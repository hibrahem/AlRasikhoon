# CI — Al-Rasikhoon
#
# Refs: issue #6 (this pipeline).
#
# Two independent jobs:
#   - flutter:   analyze + UNIT tests for the Flutter/Dart app
#   - functions: build (+ lint) for the Firebase Cloud Functions TypeScript package
#
# The jobs are intentionally independent (no `needs:`) so a failure in one
# does not mask the result of the other and both run in parallel.
#
# Design rationale + options considered: docs/agdr/AgDR-0001-github-actions-ci.md
# Job descriptions: .github/workflows/README.md

name: CI

# Quoted so the key is an unambiguous string under any YAML parser
# (bare `on:` is coerced to boolean `true` under YAML 1.1 — the "Norway
# problem"). GitHub Actions accepts both; quoting keeps tooling honest.
"on":
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Pinned Flutter stable that bundles Dart 3.9.2, satisfying the
  # pubspec.yaml constraint `environment: sdk: ^3.9.2`.
  # NOTE: Flutter 3.35.0–3.35.2 bundle Dart 3.9.0 which does NOT satisfy
  # `^3.9.2`, so the patch version is load-bearing — do not loosen to `3.35.x`.
  FLUTTER_VERSION: "3.35.7"

  # Node version for the Cloud Functions job. Source of truth is
  # functions/package.json -> engines.node ("22"). Keep this constant in
  # sync with engines.node; it is the single place to change on a runtime bump.
  NODE_VERSION: "22"

jobs:
  # ===========================================================================
  # flutter — analyze + unit tests for the Flutter/Dart app
  # ===========================================================================
  flutter:
    name: Flutter (analyze + unit tests)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      # `flutter analyze` exits non-zero when the analyzer reports any
      # error/warning, so this step already fails the job on issues.
      - name: Analyze
        run: flutter analyze

      # Unit suite only. `flutter test` defaults to the `test/` directory and
      # does NOT pick up `integration_test/` — scoping to `test/` explicitly
      # documents the intent and keeps the boundary obvious.
      #
      # FOLLOW-UP (issue #5): integration tests live in `integration_test/`
      # and require a booted device/emulator (or the Firebase emulator suite).
      # They are deliberately NOT wired here — that is tracked separately under
      # issue #5. Do not add `flutter test integration_test` to this job.
      - name: Unit tests
        run: flutter test test/

  # ===========================================================================
  # functions — build (+ lint) for the Firebase Cloud Functions package
  # ===========================================================================
  functions:
    name: Functions (build + lint)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: functions

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # `npm ci` requires a committed package-lock.json. This repo
      # deliberately gitignores functions/package-lock.json (root .gitignore:
      # "Cloud Function lockfile (regenerated by npm)"), so there is no lock to
      # install from in CI — `npm install` is the correct choice here. See the
      # tradeoffs section of docs/agdr/AgDR-0001-github-actions-ci.md.
      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      # functions/package.json defines a `lint` script
      # ("eslint --ext .ts src/"). Run it. If a future change removes the
      # script, `npm run lint --if-present` makes this step a silent no-op
      # instead of a hard failure.
      - name: Lint
        run: npm run lint --if-present
