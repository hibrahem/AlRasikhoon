# Daily audit that every Gen2 Cloud Function in production is publicly
# invocable (member `allUsers` holds role `roles/run.invoker` on the backing
# Cloud Run service).
#
# Background: on 2026-05-10 `setUserPassword` was silently broken for ~14h
# because its Cloud Run service was missing that binding — Firebase only
# grants it on a clean new-service create, not on a retry of a failed create.
# A successful-looking deploy left the function returning 403 to every client.
# This job catches that class of drift within 24h instead of when a user
# reports it.
#
# ────────────────────────────────────────────────────────────────────────────
# CONFIGURATION — three repository variables (Settings → Secrets and
# variables → Actions → Variables) must be set before the audit can run:
#
#   GCP_PROJECT_ID           production GCP / Firebase project ID
#                            (the live one is alrasikhoon-57151 — confirm).
#   GCP_WIF_PROVIDER         full resource name of the Workload Identity
#                            Provider, e.g. projects/123456789/locations/
#                            global/workloadIdentityPools/POOL/providers/PROV
#   GCP_WIF_SERVICE_ACCOUNT  email of a READ-ONLY service account the WIF
#                            provider may impersonate. Needs
#                            roles/cloudfunctions.viewer + roles/run.viewer
#                            ONLY. Do NOT grant any IAM-write role.
#
# Until all three are set, the job SKIPS the audit with a warning annotation
# instead of failing — an unconfigured audit is not a security finding, and a
# daily red run only trains people to ignore this workflow. This job never
# mutates IAM; it only reports drift, and the audit script's --fix flag merely
# PRINTS the remediation command, it does not execute it.
# ────────────────────────────────────────────────────────────────────────────

name: Functions IAM Audit

on:
  schedule:
    # Daily at 06:00 UTC. Adjust if you want it before/after a deploy window.
    - cron: "0 6 * * *"
  # Allow a maintainer to run it on demand from the Actions tab.
  workflow_dispatch:

# Least privilege: read the repo, mint the OIDC token for Workload Identity
# Federation, and (on failure) open/comment a tracking issue.
permissions:
  contents: read
  id-token: write
  issues: write

# Never run two audits at once; cancel an in-flight run if a newer one starts.
concurrency:
  group: functions-iam-audit
  cancel-in-progress: false

jobs:
  audit:
    name: Audit prod functions IAM
    runs-on: ubuntu-latest
    steps:
      # Gate everything on the three repo variables being present. When any
      # is missing the job ends green-with-warning: the audit cannot draw any
      # conclusion, and failing daily just buries the one failure that will
      # someday matter.
      - name: Check audit configuration
        id: preflight
        env:
          GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
          GCP_WIF_SERVICE_ACCOUNT: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}
        run: |
          missing=()
          [[ -z "$GCP_PROJECT_ID" ]] && missing+=("GCP_PROJECT_ID")
          [[ -z "$GCP_WIF_PROVIDER" ]] && missing+=("GCP_WIF_PROVIDER")
          [[ -z "$GCP_WIF_SERVICE_ACCOUNT" ]] && missing+=("GCP_WIF_SERVICE_ACCOUNT")
          if (( ${#missing[@]} == 0 )); then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=Functions IAM audit skipped — not configured::Repository variable(s) ${missing[*]} are unset, so the audit cannot authenticate to GCP and no function was checked. Set them under Settings → Secrets and variables → Actions → Variables (see the header of .github/workflows/functions-iam-audit.yml)."
          fi

      - name: Checkout
        if: steps.preflight.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        id: auth
        if: steps.preflight.outputs.configured == 'true'
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        if: steps.preflight.outputs.configured == 'true'
        uses: google-github-actions/setup-gcloud@v2

      - name: Run Gen2 functions IAM audit (prod)
        id: audit
        if: steps.preflight.outputs.configured == 'true'
        run: |
          # FUNCTIONS_REGION must match the region in functions/src/index.ts
          # (currently us-central1). Keep these in sync if the region changes.
          #
          # Capture the script's output so that, on a genuine audit failure, we
          # can surface the offending function names in the tracking issue.
          # `set -o pipefail` ensures the script's non-zero exit (a real
          # finding) still fails this step despite the `tee` pipe.
          set -o pipefail
          bash scripts/audit_functions_iam.sh \
            --project "${{ steps.auth.outputs.project_id }}" \
            --region us-central1 2>&1 | tee audit_output.log
        # Always emit the failed-function names (if any) as a step output, even
        # when the step fails — `if: always()` keeps the issue-opener able to
        # read `steps.audit.outputs.failed_functions`.
      - name: Collect failed function names
        id: audit_result
        if: always() && steps.preflight.outputs.configured == 'true'
        run: |
          # Lines look like: "FAIL  setUserPassword  (allUsers missing ...)".
          # Pull the 2nd whitespace-delimited field from each FAIL line.
          if [[ -f audit_output.log ]]; then
            FUNCS="$(grep -E '^FAIL  ' audit_output.log | awk '{print $2}' | paste -sd ',' - || true)"
          else
            FUNCS=""
          fi
          echo "failed_functions=${FUNCS}" >> "$GITHUB_OUTPUT"

      - name: Open / comment a tracking issue on failure
        if: failure()
        uses: actions/github-script@v7
        env:
          # Did the audit step itself fail (a real security finding), or did a
          # setup/auth/checkout step fail before the audit could run?
          AUDIT_OUTCOME: ${{ steps.audit.outcome }}
          FAILED_FUNCTIONS: ${{ steps.audit_result.outputs.failed_functions }}
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // Distinguish the two failure classes:
            //  - audit ran AND found a non-invocable function  → loud security alert
            //  - audit could NOT run (auth/setup/checkout failed before it) → config alert
            // `steps.audit.outcome === 'failure'` is true only when the audit
            // step actually executed and exited non-zero. If an earlier step
            // (checkout, auth, setup-gcloud) failed, the audit step is skipped
            // and its outcome is 'skipped' (or '' if it never reached) — that's
            // the "could not run" branch.
            const auditRan = process.env.AUDIT_OUTCOME === "failure";
            const failedFunctions = (process.env.FAILED_FUNCTIONS || "")
              .split(",")
              .map(s => s.trim())
              .filter(Boolean);

            let title;
            let body;

            if (auditRan) {
              title = "Cloud Functions IAM audit FAILED — a function is not publicly invocable";
              const lines = [
                "The daily Functions IAM audit ran and failed: at least one Gen2",
                "Cloud Function is missing the `allUsers` → `roles/run.invoker`",
                "binding on its backing Cloud Run service.",
                "",
                "**Impact:** that function returns 403 to every client call",
                "(this is exactly the failure mode that silently broke",
                "`setUserPassword` for ~14h on 2026-05-10).",
                "",
              ];
              if (failedFunctions.length > 0) {
                lines.push("**Affected function(s):**");
                for (const fn of failedFunctions) {
                  lines.push("- `" + fn + "`");
                }
                lines.push("");
              }
              lines.push(
                `**Failed run:** ${runUrl}`,
                "",
                "**Remediation:** run the audit locally with `--fix` to print the",
                "exact `gcloud run services add-iam-policy-binding` command(s):",
                "",
                "```",
                "scripts/audit_functions_iam.sh \\",
                "  --project <PROD_PROJECT_ID> --region us-central1 --fix",
                "```",
                "",
                "Then run the printed command(s) after review, and re-trigger this",
                "workflow from the Actions tab to confirm green.",
              );
              body = lines.join("\n");
            } else {
              title = "Functions IAM audit could not run (setup/auth error — check WIF config)";
              body = [
                "The daily Functions IAM audit job failed **before the audit step",
                "ran** — a setup step (checkout, Workload Identity Federation auth,",
                "or Cloud SDK setup) failed, so no function was ever checked.",
                "",
                "**This is NOT a security finding.** No conclusion can be drawn",
                "about whether any function is publicly invocable; the audit never",
                "executed.",
                "",
                "**Likely cause:** the repository variables (`GCP_PROJECT_ID`,",
                "`GCP_WIF_PROVIDER`, `GCP_WIF_SERVICE_ACCOUNT`) hold wrong or stale",
                "values — an unset variable skips the audit instead of failing, so",
                "reaching this point means auth was attempted with what is set.",
                "See the header of `.github/workflows/functions-iam-audit.yml`.",
                "(This is the false-alarm class from incident #19.)",
                "",
                `**Failed run:** ${runUrl}`,
                "",
                "**Action:** fix the Workload Identity Federation / workflow",
                "configuration, then re-trigger this workflow from the Actions tab.",
                "Once the setup steps pass, the audit will run and report real",
                "IAM drift (or confirm green).",
              ].join("\n");
            }

            // Reuse an existing open issue if one is already tracking this,
            // otherwise open a fresh one. Avoids a new issue every day.
            const marker = "<!-- functions-iam-audit -->";
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "functions-iam-audit",
              per_page: 50,
            });
            const open = existing.data.find(i => i.body && i.body.includes(marker));

            if (open) {
              const detail = auditRan
                ? (failedFunctions.length > 0
                    ? `audit ran and found non-invocable function(s): ${failedFunctions.map(f => "`" + f + "`").join(", ")}`
                    : "audit ran and found a non-invocable function")
                : "audit could NOT run (setup/auth error — check WIF config); no function was checked";
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: open.number,
                body: `Failed again on ${new Date().toISOString()} — ${detail}.\n\n${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: `${marker}\n\n${body}`,
                labels: ["functions-iam-audit"],
              });
            }
