<svg width="1152" height="1152" viewBox="0 0 1152 1152" xmlns="http://www.w3.org/2000/svg">
  <!-- Al-Rasikhoon — a rooted mushaf. Mark is light-on-transparent; the
       splash paints brand green (#1B5E20) behind it. -->
  <g fill="none" stroke="none">
    <!-- Open book: two pages meeting at a central spine -->
    <path d="M576 402
             C512 366 432 360 366 384
             C356 388 350 398 350 409
             L350 700
             C350 711 356 720 366 717
             C432 697 512 703 576 738 Z"
          fill="#F7F7F2"/>
    <path d="M576 402
             C640 366 720 360 786 384
             C796 388 802 398 802 409
             L802 700
             C802 711 796 720 786 717
             C720 697 640 703 576 738 Z"
          fill="#CFE8CE"/>
    <!-- Spine -->
    <rect x="568" y="404" width="16" height="330" rx="8" fill="#1B5E20"/>
    <!-- Page lines (left) -->
    <path d="M410 452 C470 438 520 440 556 456" stroke="#C7D8C6" stroke-width="11" stroke-linecap="round"/>
    <path d="M410 512 C470 498 520 500 556 516" stroke="#C7D8C6" stroke-width="11" stroke-linecap="round"/>
    <path d="M410 572 C470 558 520 560 556 576" stroke="#C7D8C6" stroke-width="11" stroke-linecap="round"/>
    <!-- Page lines (right) -->
    <path d="M596 456 C632 440 682 438 742 452" stroke="#8FB98D" stroke-width="11" stroke-linecap="round"/>
    <path d="M596 516 C632 500 682 498 742 512" stroke="#8FB98D" stroke-width="11" stroke-linecap="round"/>
    <path d="M596 576 C632 560 682 558 742 572" stroke="#8FB98D" stroke-width="11" stroke-linecap="round"/>
    <!-- Roots descending from the spine -->
    <path d="M576 740 C576 792 520 812 486 866" stroke="#8FC98D" stroke-width="16" stroke-linecap="round" fill="none"/>
    <path d="M576 740 C576 800 576 828 576 884" stroke="#8FC98D" stroke-width="16" stroke-linecap="round" fill="none"/>
    <path d="M576 740 C576 792 632 812 666 866" stroke="#8FC98D" stroke-width="16" stroke-linecap="round" fill="none"/>
    <!-- Fine root tendrils -->
    <path d="M486 866 C476 884 470 900 452 910" stroke="#8FC98D" stroke-width="10" stroke-linecap="round" fill="none"/>
    <path d="M666 866 C676 884 682 900 700 910" stroke="#8FC98D" stroke-width="10" stroke-linecap="round" fill="none"/>
    <circle cx="452" cy="912" r="9" fill="#8FC98D"/>
    <circle cx="576" cy="886" r="9" fill="#8FC98D"/>
    <circle cx="700" cy="912" r="9" fill="#8FC98D"/>
  </g>
</svg>
